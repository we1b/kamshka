<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كمشكاة | النشرة البريدية</title>
    <link rel="icon" type="image/png" href="images/ui/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="newsletter">
    <div class="fixed-bg"><img src="images/ui/bg.jpg" onerror="this.style.display='none'"></div>
    <div id="header-ph"></div>

    <main class="pt-32 px-4 container mx-auto min-h-screen flex items-center justify-center pb-16 fade-in">
        <div class="glass-panel p-10 md:p-14 rounded-3xl w-full max-w-2xl bg-white/80 shadow-2xl border-white relative overflow-hidden text-center hover:shadow-emerald-900/10 transition-all duration-500">
            <!-- شكل ديكوري في الخلفية -->
            <div class="absolute -top-12 -left-12 opacity-5 pointer-events-none">
                <i data-lucide="mail" class="w-64 h-64 text-emerald-900"></i>
            </div>

            <div class="relative z-10">
                <div class="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm hover:scale-110 transition-transform duration-300">
                    <i data-lucide="send" class="w-10 h-10 text-emerald-600 ml-1"></i>
                </div>
                
                <h1 class="text-3xl md:text-4xl font-black text-emerald-900 mb-4">نور يوصلك كل أسبوع 💌</h1>
                <p class="text-slate-600 font-bold text-lg mb-8 leading-relaxed">
                    بعيداً عن دوشة السوشيال ميديا وإشعاراتها، اشترك في رسالتنا الأسبوعية عشان يوصلك مقالات ومصادر هادية تساعدك ترتب أفكارك وتبني عاداتك.
                </p>

                <form onsubmit="event.preventDefault(); alert('نورت القائمة يا بطل! رسالتنا الأولى في الطريق ليك 🤍');" class="max-w-md mx-auto">
                    <div class="relative group mb-4">
                        <input type="email" required class="w-full bg-white/90 border border-emerald-100 rounded-2xl px-5 py-4 ps-12 focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 transition-all font-medium shadow-sm text-center md:text-right" placeholder="اكتب إيميلك هنا...">
                        <i data-lucide="mail" class="absolute start-4 top-4 text-slate-400 w-6 h-6 group-focus-within:text-emerald-500 transition-colors"></i>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all duration-300 transform hover:-translate-y-1 hover:shadow-emerald-300 text-lg flex items-center justify-center gap-2">
                        اشترك دلوقتي <i data-lucide="check-circle" class="w-5 h-5"></i>
                    </button>
                </form>
                
                <p class="text-slate-400 text-xs font-bold mt-6">بنحترم خصوصيتك جداً، مفيش أي إزعاج أو رسائل مزعجة (Spam).</p>
            </div>
        </div>
    </main>

    <div id="footer-ph"></div>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
