<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | كمشكاة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-slate-800 min-h-screen flex flex-col relative pt-6">

    <div class="fixed inset-0 bg-white/30 -z-10"></div>

    <nav class="glass-panel container mx-auto px-6 py-4 rounded-3xl shadow-xl flex justify-between items-center w-[95%] max-w-7xl sticky top-4 z-50 transition-all duration-500">
        <a href="index.html" class="text-2xl font-bold text-emerald-800 tracking-wide">كمشكاة</a>
        <div class="hidden md:flex space-x-8 space-x-reverse text-lg font-semibold">
            <a href="index.html" class="hover:text-emerald-600 transition-colors">الرئيسية</a>
            <a href="articles.html" class="hover:text-emerald-600 transition-colors">المقالات</a>
            <a href="books.html" class="hover:text-emerald-600 transition-colors">الكتب</a>
            <a href="start.html" class="hover:text-emerald-600 transition-colors">ابدأ من هنا</a>
            <a href="about.html" class="hover:text-emerald-600 transition-colors">من نحن</a>
        </div>
        <button id="mobile-menu-btn" class="md:hidden text-slate-800 focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </nav>

    <div id="mobile-menu" class="hidden container mx-auto w-[95%] mt-2 rounded-3xl p-4 flex-col space-y-4 text-center text-lg font-semibold md:hidden absolute z-40 top-24 left-0 right-0">
        <a href="index.html" class="block hover:text-emerald-600">الرئيسية</a>
        <a href="articles.html" class="block hover:text-emerald-600">المقالات</a>
        <a href="books.html" class="block hover:text-emerald-600">الكتب</a>
        <a href="start.html" class="block hover:text-emerald-600">ابدأ من هنا</a>
        <a href="about.html" class="block hover:text-emerald-600">من نحن</a>
    </div>

    <main class="flex-grow container mx-auto px-4 py-12 w-[95%] max-w-4xl">
        
        <div class="glass-panel rounded-3xl shadow-xl p-8 md:p-12 transition-all duration-500 hover:shadow-2xl">
            <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-900 mb-4 text-center">خلينا على تواصل</h1>
            <p class="text-lg text-slate-600 text-center mb-10 font-medium">عندك فكرة، استفسار، أو حابب تشاركنا رأيك؟ ابعتلنا رسالة وهنرد عليك في أقرب وقت.</p>

            <form id="contact-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="name" class="block text-emerald-800 font-bold mb-2">الاسم</label>
                        <input type="text" id="name" required class="w-full px-5 py-3 rounded-xl bg-white/50 border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white/80 transition-all font-medium">
                    </div>
                    <div>
                        <label for="email" class="block text-emerald-800 font-bold mb-2">البريد الإلكتروني</label>
                        <input type="email" id="email" required class="w-full px-5 py-3 rounded-xl bg-white/50 border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white/80 transition-all font-medium">
                    </div>
                </div>
                
                <div>
                    <label for="message" class="block text-emerald-800 font-bold mb-2">رسالتك</label>
                    <textarea id="message" rows="5" required class="w-full px-5 py-3 rounded-xl bg-white/50 border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white/80 transition-all font-medium resize-none"></textarea>
                </div>

                <div class="text-center pt-4">
                    <button type="submit" class="glass-panel px-10 py-3 rounded-xl font-bold text-emerald-800 border-emerald-200 hover:bg-emerald-50 transition-all hover:-translate-y-1 hover:shadow-lg inline-flex items-center gap-2">
                        <span>إرسال الرسالة</span>
                        <svg class="w-5 h-5 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </form>
        </div>

    </main>

    <!-- عنصر الرسائل المنبثقة -->
    <div id="toast-container" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 z-50 hidden">
        <div class="glass-panel px-6 py-3 rounded-full shadow-lg flex items-center gap-3 border-emerald-300">
            <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            <span class="text-emerald-900 font-bold" id="toast-message">تم إرسال رسالتك بنجاح!</span>
        </div>
    </div>

    <footer class="glass-panel container mx-auto rounded-t-3xl shadow-xl py-6 text-center w-[95%] max-w-7xl mt-auto">
        <p class="text-slate-600 font-semibold">جميع الحقوق محفوظة © كمشكاة</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
