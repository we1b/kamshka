<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كمشكاة | الرئيسية</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-482MR7LT23"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-482MR7LT23');
    </script>

    <link rel="icon" type="image/png" href="images/ui/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="home">
    <div class="fixed-bg"><img src="images/ui/bg.jpg" onerror="this.style.display='none'"></div>
    <div id="header-ph"></div>

    <main class="pt-32 px-4 container mx-auto text-center min-h-screen">
        <div class="glass-panel p-12 rounded-3xl mb-12 fade-in bg-white/40 border-white/60 hover:shadow-2xl transition-all duration-500">
            <h1 class="text-5xl md:text-8xl font-black mb-6 text-emerald-800 drop-shadow-sm hover:scale-105 transition-transform duration-500 cursor-default">كمشكاة</h1>
            <p class="text-2xl text-slate-700 font-bold mb-10">"استعن بالله ولا تعجز"</p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="start.html" class="bg-emerald-600 px-10 py-4 rounded-2xl font-bold text-white hover:bg-emerald-700 transition-all duration-300 transform hover:-translate-y-1 hover:shadow-xl shadow-lg shadow-emerald-300/50 text-lg flex items-center justify-center gap-2">
                    <i data-lucide="rocket"></i> <span data-i18n="btn_start">ابدأ من هنا</span>
                </a>
                <a href="articles.html" class="bg-white/80 px-10 py-4 rounded-2xl font-bold text-emerald-800 hover:bg-white hover:text-emerald-900 transition-all duration-300 transform hover:-translate-y-1 hover:shadow-xl shadow-sm text-lg border border-emerald-100 flex items-center justify-center gap-2">
                    <i data-lucide="book-open"></i> <span data-i18n="btn_articles">تصفح المقالات</span>
                </a>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 fade-in delay-100">
            <div class="glass-panel p-8 rounded-2xl bg-white/60 hover:-translate-y-2 hover:shadow-xl transition-all duration-300 cursor-default group border border-white">
                <div class="text-5xl font-black text-emerald-600 mb-2 counter-number group-hover:scale-110 transition-transform duration-300" data-target="2340">0+</div>
                <div class="text-slate-600 font-bold text-lg" data-i18n="stat_followers">زائر للموقع</div>
            </div>
            <div class="glass-panel p-8 rounded-2xl bg-white/60 hover:-translate-y-2 hover:shadow-xl transition-all duration-300 cursor-default group border border-white">
                <div class="text-5xl font-black text-emerald-600 mb-2 counter-number group-hover:scale-110 transition-transform duration-300" data-target="100">0+</div>
                <div class="text-slate-600 font-bold text-lg" data-i18n="stat_courses">كورس ومقال</div>
            </div>
            <div class="glass-panel p-8 rounded-2xl bg-white/60 hover:-translate-y-2 hover:shadow-xl transition-all duration-300 cursor-default group border border-white">
                <div class="text-5xl font-black text-emerald-600 mb-2 group-hover:scale-110 transition-transform duration-300">∞</div>
                <div class="text-slate-600 font-bold text-lg" data-i18n="stat_ambition">طموح بلا حدود</div>
            </div>
        </div>
    </main>

    <div id="footer-ph"></div>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
