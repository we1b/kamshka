<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كمشكاة | معرض التصميمات</title>
    
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="gallery">
    <div class="fixed-bg"><img src="images/bg.jpg" onerror="this.style.display='none'"></div>
    <div id="header-ph"></div>

    <!-- لايت بوكس لعرض الصور بحجم كامل -->
    <div id="lightbox" onclick="closeLightbox()" class="fixed inset-0 z-[9999] hidden bg-black/95 backdrop-blur-md flex items-center justify-center p-2 transition-opacity duration-300">
        <button class="absolute top-5 right-5 bg-white/10 text-white p-3 rounded-full hover:bg-white/20 transition z-50">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <img id="lightbox-img" src="" class="max-h-[90vh] max-w-full rounded-lg shadow-2xl object-contain transition-transform duration-300 scale-95" onclick="event.stopPropagation()">
        <a id="lightbox-download" href="#" download class="absolute bottom-8 bg-emerald-600 text-white px-8 py-3 rounded-full font-bold shadow-2xl flex items-center gap-2 hover:bg-emerald-700 transition transform hover:scale-105" onclick="event.stopPropagation()">
            <i data-lucide="download" class="w-5 h-5"></i> تحميل الصورة
        </a>
    </div>

    <main class="pt-32 px-4 container mx-auto min-h-screen pb-12">
        <div class="text-center mb-12 fade-in">
            <h1 class="text-4xl md:text-5xl font-black text-emerald-900 mb-2">معرض التصميمات</h1>
            <p class="text-slate-600 font-bold text-lg">إبداع متجدد وتغذية بصرية</p>
        </div>

        <div id="gallery-grid" class="columns-1 sm:columns-2 lg:columns-3 gap-6 space-y-6">
            <!-- الصور هتتضاف هنا بالجافاسكريبت -->
        </div>

        <div class="text-center mt-12">
            <button id="load-more-gallery" class="bg-white/80 text-emerald-800 px-8 py-3 rounded-full font-bold hover:bg-white transition border border-emerald-200 shadow-md inline-flex items-center gap-2">
                عرض المزيد <i data-lucide="arrow-down" class="w-5 h-5"></i>
            </button>
        </div>
    </main>

    <div id="footer-ph"></div>
    <script src="js/main.js"></script>
    <script>
        // الأرقام دي بترمز لأسماء الصور من 1 لـ 10000 زي ما اتفقنا
        const galleryImages = ["1.JPG", "2.JPG", "3.JPG", "4.JPG", "5.JPG", "6.JPG"];
        let visibleCount = 0;
        const INCREMENT = 6;

        document.addEventListener('DOMContentLoaded', () => {
            loadGalleryBatch();
            document.getElementById('load-more-gallery').addEventListener('click', loadGalleryBatch);
        });

        function loadGalleryBatch() {
            const grid = document.getElementById('gallery-grid');
            const btn = document.getElementById('load-more-gallery');
            
            let start = visibleCount;
            let end = start + INCREMENT;

            if (start >= galleryImages.length) {
                if(btn) btn.style.display = 'none';
                return;
            }
            if (end >= galleryImages.length) {
                end = galleryImages.length;
                if(btn) btn.style.display = 'none';
            }

            let html = '';
            for(let i=start; i<end; i++) {
                const imgName = galleryImages[i];
                const imgSrc = `images/${imgName}`;
                const fallbackImg = `https://placehold.co/600x800/dcfce7/065f46?text=صورة+${i+1}`;

                html += `
                <div class="break-inside-avoid glass-panel rounded-3xl overflow-hidden group relative bg-white/40 border border-white hover:shadow-xl transition duration-500 fade-in">
                    <div class="cursor-pointer relative overflow-hidden" onclick="openLightbox('${imgSrc}')">
                        <img src="${imgSrc}" loading="lazy" class="w-full h-auto block transform transition duration-700 group-hover:scale-105" 
                             onerror="this.onerror=null; this.src='${fallbackImg}'">
                        <div class="absolute inset-0 bg-emerald-900/20 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">
                            <div class="bg-white/90 text-emerald-900 p-4 rounded-full shadow-lg transform scale-75 group-hover:scale-100 transition duration-300">
                                <i data-lucide="zoom-in" class="w-6 h-6"></i>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            grid.insertAdjacentHTML('beforeend', html);
            visibleCount = end;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const dl = document.getElementById('lightbox-download');
            img.src = src;
            dl.href = src;
            lb.classList.remove('hidden');
            lb.classList.add('flex');
            setTimeout(() => img.classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                lb.classList.add('hidden');
                lb.classList.remove('flex');
            }, 300);
        }
    </script>
</body>
</html>
