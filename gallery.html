<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كمشكاة | معرض التصميمات</title>
    <link rel="icon" type="image/png" href="images/ui/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="gallery">
    <div class="fixed-bg"><img src="images/ui/bg.jpg" onerror="this.style.display='none'"></div>
    <div id="header-ph"></div> 

    <!-- Lightbox Modal -->
    <div id="lightbox" onclick="closeLightbox()" class="fixed inset-0 z-[9999] hidden bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-4 transition-opacity duration-300">
        <button class="absolute top-6 right-6 bg-white/10 text-white p-3 rounded-full hover:bg-white/20 transition-colors duration-300 z-50">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <img id="lightbox-img" src="" class="max-h-[85vh] max-w-full rounded-2xl shadow-2xl object-contain transition-transform duration-300 transform scale-95" onclick="event.stopPropagation()">
    </div>

    <main class="pt-32 px-4 container mx-auto min-h-screen pb-16 fade-in">
        <div class="text-center mb-12">
            <div class="inline-block bg-purple-100 p-4 rounded-2xl mb-4 shadow-sm hover:scale-110 transition-transform duration-300">
                <i data-lucide="palette" class="w-10 h-10 text-purple-600"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-emerald-900 mb-4 drop-shadow-sm">التغذية البصرية 🎨</h1>
            <p class="text-slate-600 font-bold text-lg max-w-2xl mx-auto">مكان يجمع الإلهام والإبداع، عشان تشحن طاقتك البصرية وتشوف أفكار تتنفذ على أرض الواقع.</p>
        </div>

        <!-- شبكة الصور (Masonry Layout) -->
        <div class="masonry-grid max-w-6xl mx-auto">
            <!-- صورة 1 -->
            <div class="break-inside-avoid mb-6 glass-panel rounded-3xl overflow-hidden group relative bg-white/60 border border-white hover:shadow-2xl hover:shadow-purple-900/10 transition-all duration-500 hover:-translate-y-1">
                <div class="cursor-pointer relative" onclick="openLightbox('images/1article.webp')">
                    <img src="images/1article.webp" loading="lazy" class="w-full h-auto block transform transition duration-700 group-hover:scale-105" onerror="this.src='images/ui/bg.jpg'">
                    <div class="absolute inset-0 bg-slate-900/30 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                        <div class="bg-white/90 text-slate-900 p-4 rounded-full shadow-lg transform scale-75 group-hover:scale-100 transition-transform duration-300">
                            <i data-lucide="maximize-2" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- صورة 2 -->
            <div class="break-inside-avoid mb-6 glass-panel rounded-3xl overflow-hidden group relative bg-white/60 border border-white hover:shadow-2xl hover:shadow-purple-900/10 transition-all duration-500 hover:-translate-y-1">
                <div class="cursor-pointer relative" onclick="openLightbox('images/2article.webp')">
                    <img src="images/2article.webp" loading="lazy" class="w-full h-auto block transform transition duration-700 group-hover:scale-105" onerror="this.src='images/ui/bg.jpg'">
                    <div class="absolute inset-0 bg-slate-900/30 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                        <div class="bg-white/90 text-slate-900 p-4 rounded-full shadow-lg transform scale-75 group-hover:scale-100 transition-transform duration-300">
                            <i data-lucide="maximize-2" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- صورة 3 -->
            <div class="break-inside-avoid mb-6 glass-panel rounded-3xl overflow-hidden group relative bg-white/60 border border-white hover:shadow-2xl hover:shadow-purple-900/10 transition-all duration-500 hover:-translate-y-1">
                <div class="cursor-pointer relative" onclick="openLightbox('images/3article.webp')">
                    <img src="images/3article.webp" loading="lazy" class="w-full h-auto block transform transition duration-700 group-hover:scale-105" onerror="this.src='images/ui/bg.jpg'">
                    <div class="absolute inset-0 bg-slate-900/30 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                        <div class="bg-white/90 text-slate-900 p-4 rounded-full shadow-lg transform scale-75 group-hover:scale-100 transition-transform duration-300">
                            <i data-lucide="maximize-2" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-ph"></div>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
