<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كمشكاة | المقالات</title>
    <link rel="icon" type="image/png" href="images/ui/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="articles">
    <div class="fixed-bg"><img src="images/ui/bg.jpg" onerror="this.style.display='none'"></div>
    <div id="header-ph"></div>

    <main class="pt-32 px-4 container mx-auto min-h-screen pb-12">
        <div class="text-center mb-10 fade-in">
            <h1 class="text-4xl md:text-5xl font-black text-emerald-900 mb-3 drop-shadow-sm">المدونة</h1>
            <p class="text-lg text-slate-600 font-bold">خلاصة التجارب والخطوات العملية في مكان واحد.</p>
        </div>

        <div class="max-w-xl mx-auto mb-12 fade-in group relative hover:scale-[1.02] transition-transform duration-300">
            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
                <i data-lucide="search" class="w-5 h-5 text-slate-400 group-focus-within:text-emerald-600 transition-colors"></i>
            </div>
            <input type="text" id="article-search" class="block w-full p-4 pr-12 text-sm text-slate-900 border border-emerald-100 rounded-full bg-white/90 focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 focus:bg-white transition-all shadow-md font-medium" placeholder="ابحث عن مقال...">
        </div>

        <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in delay-100">
            </div>
    </main>

    <div id="footer-ph"></div>
    
    <script src="js/main.js"></script>
    <script src="js/articles-data.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // كود بسيط لربط الفهرس (articles-data.js) بصفحة العرض
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof articlesData !== 'undefined') {
                renderArticlesList(articlesData);
                
                // تفعيل البحث
                document.getElementById('article-search').addEventListener('keyup', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = articlesData.filter(a => a.title.toLowerCase().includes(term) || a.desc.toLowerCase().includes(term));
                    renderArticlesList(filtered);
                });
            } else {
                document.getElementById('articles-grid').innerHTML = '<p class="col-span-full text-center text-slate-500 font-bold">جاري تحميل المقالات أو يوجد خطأ في الفهرس.</p>';
            }
        });

        function renderArticlesList(data) {
            const grid = document.getElementById('articles-grid');
            if(data.length > 0){
                grid.innerHTML = data.map(art => `
                    <article class="glass-panel rounded-3xl overflow-hidden hover:-translate-y-2 transition-all duration-300 hover:shadow-2xl flex flex-col h-full bg-white/80 border border-white group">
                        <div class="h-56 overflow-hidden relative">
                            <img src="${art.image}" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-700 ease-out" onerror="this.src='images/ui/bg.jpg'">
                        </div>
                        <div class="p-6 flex-1 flex flex-col">
                            <div class="text-xs text-emerald-600 bg-emerald-50 w-max px-3 py-1 rounded-full font-bold mb-3 flex items-center gap-1">
                                <i data-lucide="calendar" class="w-3 h-3"></i> ${art.date}
                            </div>
                            <h2 class="text-xl font-black text-slate-900 mb-3 leading-snug group-hover:text-emerald-700 transition-colors">${art.title}</h2>
                            <p class="text-slate-600 text-sm line-clamp-3 mb-6 flex-1 leading-relaxed">${art.desc}</p>
                            <a href="${art.link}" class="inline-flex items-center justify-center gap-2 w-full bg-slate-100 hover:bg-emerald-600 text-slate-700 hover:text-white font-bold py-3 rounded-xl transition-all duration-300">
                                اقرأ المقال <i data-lucide="arrow-left" class="w-4 h-4"></i>
                            </a>
                        </div>
                    </article>
                `).join('');
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } else {
                grid.innerHTML = `<div class="col-span-full text-center py-12"><i data-lucide="search-x" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i><p class="text-slate-500 font-bold text-lg">لم يتم العثور على مقالات تطابق بحثك 🤷‍♂️</p></div>`;
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        }
    </script>
</body>
</html>
