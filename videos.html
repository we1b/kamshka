<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كمشكاة | المرئيات</title>
    
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="videos">
    <div class="fixed-bg"><img src="images/bg.jpg" onerror="this.style.display='none'"></div>
    <div id="header-ph"></div>

    <main class="pt-32 px-4 container mx-auto min-h-screen pb-12 fade-in">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-black text-emerald-900 mb-4">المرئيات</h1>
            <p class="text-lg text-slate-600 font-bold">حلقات وشروحات مرئية للتطوير المستمر</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <!-- فيديو 1 -->
            <div class="glass-panel rounded-3xl bg-white/60 border-white/80 overflow-hidden hover:-translate-y-2 transition duration-300 hover:shadow-xl flex flex-col group">
                <a href="#" class="block relative h-56 overflow-hidden">
                    <img src="images/video1.jpg" class="w-full h-full object-cover transform group-hover:scale-105 transition duration-500" onerror="this.src='https://placehold.co/1280x720/dcfce7/065f46?text=فيديو+1'">
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center group-hover:bg-black/30 transition duration-300">
                        <div class="w-16 h-16 bg-white/90 rounded-full flex items-center justify-center shadow-lg transform group-hover:scale-110 transition duration-300">
                            <i data-lucide="play" class="w-8 h-8 text-emerald-600 ml-1"></i>
                        </div>
                    </div>
                </a>
                <div class="p-6 flex flex-col flex-grow">
                    <div class="text-xs text-emerald-600 font-bold mb-2 flex items-center gap-1">
                        <i data-lucide="clock" class="w-4 h-4"></i> 15:30 دقيقة
                    </div>
                    <h2 class="text-2xl font-black text-emerald-900 mb-3 group-hover:text-emerald-600 transition">إزاي ترتب أولوياتك؟</h2>
                    <p class="text-slate-600 font-semibold mb-6 flex-grow line-clamp-2">
                        شرح عملي لطريقة ترتيب المهام اليومية بدون الشعور بالضغط أو التشتت.
                    </p>
                </div>
            </div>

            <!-- فيديو 2 -->
            <div class="glass-panel rounded-3xl bg-white/60 border-white/80 overflow-hidden hover:-translate-y-2 transition duration-300 hover:shadow-xl flex flex-col group">
                <a href="#" class="block relative h-56 overflow-hidden">
                    <img src="images/video2.jpg" class="w-full h-full object-cover transform group-hover:scale-105 transition duration-500" onerror="this.src='https://placehold.co/1280x720/dcfce7/065f46?text=فيديو+2'">
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center group-hover:bg-black/30 transition duration-300">
                        <div class="w-16 h-16 bg-white/90 rounded-full flex items-center justify-center shadow-lg transform group-hover:scale-110 transition duration-300">
                            <i data-lucide="play" class="w-8 h-8 text-emerald-600 ml-1"></i>
                        </div>
                    </div>
                </a>
                <div class="p-6 flex flex-col flex-grow">
                    <div class="text-xs text-emerald-600 font-bold mb-2 flex items-center gap-1">
                        <i data-lucide="clock" class="w-4 h-4"></i> 08:45 دقيقة
                    </div>
                    <h2 class="text-2xl font-black text-emerald-900 mb-3 group-hover:text-emerald-600 transition">التخلص من إدمان الهاتف</h2>
                    <p class="text-slate-600 font-semibold mb-6 flex-grow line-clamp-2">
                        خطوات سريعة لتقليل استخدام السوشيال ميديا واستعادة تركيزك.
                    </p>
                </div>
            </div>

        </div>
    </main>

    <div id="footer-ph"></div>
    <script src="js/main.js"></script>
</body>
</html>
